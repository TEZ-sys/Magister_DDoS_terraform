<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Something went wrong</title>
    <style>
        :root{
            --bg:#0f1724;
            --card:#0b1220;
            --accent:#4f46e5;
            --muted:#9aa4b2;
            --glass: rgba(255,255,255,0.03);
        }
        *{box-sizing:border-box}
        html,body{height:100%}
        body{
            margin:0;
            font-family:Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
            background:
                radial-gradient(600px 600px at 10% 10%, rgba(79,70,229,0.06), transparent 10%),
                radial-gradient(500px 500px at 90% 90%, rgba(6,95,70,0.04), transparent 10%),
                var(--bg);
            color:#e6eef8;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:32px;
            -webkit-font-smoothing:antialiased;
            -moz-osx-font-smoothing:grayscale;
        }
        .card{
            width:100%;
            max-width:980px;
            background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
            border:1px solid rgba(255,255,255,0.04);
            border-radius:14px;
            padding:36px;
            display:flex;
            gap:28px;
            align-items:center;
            backdrop-filter: blur(6px);
            box-shadow: 0 8px 30px rgba(2,6,23,0.6);
        }
        .illustration{
            width:240px;
            min-width:160px;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        svg { width:140px; height:140px; }
        .content{
            flex:1;
            min-width:0;
        }
        .code{
            font-weight:700;
            font-size:64px;
            letter-spacing: -1px;
            margin:0;
            color:var(--accent);
        }
        .title{
            margin:6px 0 12px 0;
            font-size:20px;
            color:#e8f0ff;
        }
        .desc{
            margin:0 0 18px 0;
            color:var(--muted);
            line-height:1.5;
            font-size:15px;
        }
        .actions{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
        }
        .btn{
            display:inline-flex;
            align-items:center;
            gap:8px;
            padding:10px 14px;
            border-radius:10px;
            text-decoration:none;
            color:white;
            font-weight:600;
            background:var(--accent);
            border: 1px solid rgba(255,255,255,0.04);
            box-shadow: 0 6px 20px rgba(79,70,229,0.18);
            transition:transform .12s ease, box-shadow .12s ease, opacity .12s;
        }
        .btn.secondary{
            background:transparent;
            color:#cfe1ff;
            border:1px solid rgba(255,255,255,0.06);
            box-shadow:none;
        }
        .btn:active{ transform:translateY(1px) }
        .meta{
            margin-top:14px;
            color:var(--muted);
            font-size:13px;
        }
        .small{
            font-size:12px;
            color:#9fb0c8;
        }

        @media (max-width:760px){
            .card{flex-direction:column; padding:20px}
            .illustration{width:100%; order: -1; margin-bottom:6px}
            .code{font-size:48px}
        }
    </style>
</head>
<body>
    <main class="card" role="main" aria-labelledby="err-title" aria-describedby="err-desc">
        <div class="illustration" aria-hidden="true">
            <!-- friendly robot / alert SVG -->
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Error icon">
                <rect x="8" y="12" width="48" height="40" rx="6" fill="#071029" stroke="rgba(255,255,255,0.06)"/>
                <rect x="18" y="20" width="28" height="18" rx="3" fill="url(#g)"/>
                <circle cx="28" cy="28" r="2.6" fill="#fff"/>
                <circle cx="36" cy="28" r="2.6" fill="#fff"/>
                <path d="M26 36c2 2.2 6 2.2 8 0" stroke="rgba(255,255,255,0.65)" stroke-width="1.6" stroke-linecap="round"/>
                <rect x="26" y="8" width="12" height="6" rx="2" fill="#0f1724" stroke="rgba(255,255,255,0.04)"/>
                <defs>
                    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
                        <stop offset="0" stop-color="#152036"/>
                        <stop offset="1" stop-color="#0b2336"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>

        <div class="content">
            <p id="err-code" class="code">500</p>
            <h1 id="err-title" class="title">Something went wrong</h1>
            <p id="err-desc" class="desc">An unexpected error occurred while processing your request. Try refreshing the page, or contact support if the problem persists.</p>

            <div class="actions" role="group" aria-label="Error actions">
                <a class="btn" id="btn-refresh" href="#">Refresh</a>
                <a class="btn secondary" id="btn-back" href="javascript:history.back()">Go back</a>
                <a class="btn secondary" id="btn-home" href="/">Home</a>
            </div>

            <div class="meta">
                <div class="small">If you need help, copy the details below and send them to your system administrator.</div>
                <pre id="meta-block" class="small" style="margin:8px 0 0;padding:10px;border-radius:8px;background:var(--glass);overflow:auto">Error code: 500
Timestamp: —</pre>
            </div>
        </div>
    </main>

    <script>
        (function(){
            // Read optional URL params: ?code=503&message=Service%20Unavailable
            const params = new URLSearchParams(location.search);
            const code = params.get('code') || params.get('status') || '500';
            const message = params.get('message') || params.get('msg') || '';
            const ts = new Date().toISOString();

            document.getElementById('err-code').textContent = code;
            if (message) {
                document.getElementById('err-title').textContent = decodeURIComponent(message);
                document.getElementById('err-desc').textContent = '';
            }
            const meta = document.getElementById('meta-block');
            meta.textContent = [
                `Error code: ${code}`,
                `Message: ${message || 'n/a'}`,
                `URL: ${location.pathname}${location.search}`,
                `User agent: ${navigator.userAgent}`,
                `Timestamp: ${ts}`
            ].join('\n');

            document.getElementById('btn-refresh').addEventListener('click', function(e){
                e.preventDefault();
                location.reload(true);
            });
        })();
    </script>
</body>
</html>
